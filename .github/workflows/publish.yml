name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC) and provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # NOTE: do not set `registry-url` here. It makes setup-node write an
      # .npmrc with a placeholder `_authToken`, which hijacks publish auth and
      # prevents OIDC Trusted Publishing (causes a misleading E404).
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Trusted Publishing / OIDC requires a recent npm (>= 11.5.1).
      - run: npm install -g npm@latest

      - run: node -v && npm -v

      - run: npm ci

      - run: npm publish --access public --provenance
